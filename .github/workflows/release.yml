name: Release

# Releases are driven by the version in /package.json (the single source of
# truth; tauri.conf.json reads it via "version": "../package.json"). On every
# push to main we check whether a GitHub Release already exists for that version
# and, if not, build + sign + publish it. So a release = bump package.json, merge
# to main. Non-bump merges are no-ops. There is no manual tagging step.
on:
  push:
    branches:
      - main

permissions:
  contents: write

# Never let two release builds run at once (e.g. rapid merges); finish the first.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether package.json's version needs a release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; nothing to publish."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for v$VERSION yet; will build and publish."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No `version` input: package.json pins `packageManager: pnpm@11.1.1`, and
      # action-setup@v4 errors (ERR_PNPM_BAD_PM_VERSION) if a `version` input is
      # given that isn't byte-identical to that pin. Let it read the pin instead.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.x (pinned in package.json's packageManager) requires Node >= 22.13;
          # it uses the node:sqlite builtin, so Node 20 crashes the setup-node cache step.
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: native -> target

      - name: Install frontend dependencies
        run: pnpm install

      # Optional Apple Developer ID signing + notarization. Activates only when
      # the APPLE_* secrets are configured; otherwise the build keeps today's
      # ad-hoc signing (Gatekeeper right-click → Open). Required secrets:
      #   APPLE_CERTIFICATE            base64 of the Developer ID Application .p12
      #   APPLE_CERTIFICATE_PASSWORD   the .p12 password
      #   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
      #   APPLE_ID / APPLE_PASSWORD    Apple ID + app-specific password
      #   APPLE_TEAM_ID                the 10-char team id
      # The signing identity must also replace tauri.conf.json's ad-hoc "-", so
      # this step emits a config overlay (later --config wins) and exports the
      # env vars tauri-bundler reads for cert import + notarytool.
      - name: Enable Apple notarization when credentials exist
        id: apple
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "No Apple credentials configured; keeping ad-hoc signing."
            echo "extra_config=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"
          printf '{"bundle":{"macOS":{"signingIdentity":"%s"}}}' "$APPLE_SIGNING_IDENTITY" \
            > "$RUNNER_TEMP/apple-signing.json"
          echo "extra_config=--config $RUNNER_TEMP/apple-signing.json" >> "$GITHUB_OUTPUT"
          echo "Apple credentials found; release will be Developer ID signed and notarized."

      # tauri-action creates the v<version> tag at this commit and publishes the
      # GitHub Release with the signed bundle + updater artifacts. The bundle
      # version comes from tauri.conf.json -> ../package.json.
      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.check.outputs.version }}
          releaseName: "Nectus Desktop v${{ needs.check.outputs.version }}"
          releaseBody: "Download the .dmg to install, or let an installed copy auto-update."
          releaseDraft: false
          prerelease: false
          args: --config native/tauri.conf.json ${{ steps.apple.outputs.extra_config }} --target aarch64-apple-darwin
